# Fly.io 배포 설정. `fly launch --copy-config` 로 사용.
# app 이름은 `fly launch` 가 물어봐서 채워줌.

primary_region = "nrt"  # Tokyo (한국 사용자 대상 가장 가까운 region)

[build]
  dockerfile = "apps/api/Dockerfile"

[env]
  STORAGE_DIR = "/data"
  DEMUCS_MODEL = "htdemucs"
  TRANSCRIBER = "basic_pitch"
  BASS_TUNING = "5string"
  # REDIS_URL 은 secrets 로 등록: `fly secrets set REDIS_URL=...`

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"      # 유휴 시 stop, 요청 들어오면 자동 기상
  auto_start_machines = true
  min_machines_running = 0          # 무료/저비용 운영을 위해 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "2gb"
  # 메모리 부족으로 OOM 나면 4gb (~$5/월) 로 올리기:
  # `fly scale memory 4096`

[mounts]
  source = "fana_storage"
  destination = "/data"
